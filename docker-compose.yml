version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: pumpguard-postgres
    environment:
      POSTGRES_DB: pumpguard
      POSTGRES_USER: pumpguard
      POSTGRES_PASSWORD: pumpguard123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7-alpine
    container_name: pumpguard-influxdb
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: pumpguard
      DOCKER_INFLUXDB_INIT_PASSWORD: pumpguard123
      DOCKER_INFLUXDB_INIT_ORG: pumpguard
      DOCKER_INFLUXDB_INIT_BUCKET: pump_metrics
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: pumpguard-token-dev
    ports:
      - "8086:8086"
    volumes:
      - influxdata:/var/lib/influxdb2
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.9.0
    container_name: pumpguard-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    restart: unless-stopped

  emqx:
    image: emqx/emqx:5.3
    container_name: pumpguard-emqx
    ports:
      - "1883:1883"
      - "18083:18083"
    environment:
      EMQX_NAME: pumpguard
      EMQX_HOST: localhost
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: pumpguard-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pumpguard
      MINIO_ROOT_PASSWORD: pumpguard123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    restart: unless-stopped

volumes:
  pgdata:
  influxdata:
  kafkadata:
  miniodata:
